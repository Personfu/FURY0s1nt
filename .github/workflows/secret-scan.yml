name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Validate baseline exists
        run: |
          if [ ! -f .secrets.baseline ]; then
            echo "::error::.secrets.baseline is missing. Generate it with detect-secrets scan > .secrets.baseline and commit it."
            exit 1
          fi

      - name: Scan repository against baseline
        run: |
          python -m detect_secrets scan \
            --exclude-files '\.git/.*' \
            --exclude-files '.*\.sha256' \
            --exclude-files '.*\.pcap' \
            > .secrets.current.json

          python - <<'PY'
          import json
          import pathlib

          baseline = json.loads(pathlib.Path('.secrets.baseline').read_text())
          current = json.loads(pathlib.Path('.secrets.current.json').read_text())

          def flatten(results):
              rows = set()
              for filename, findings in (results or {}).items():
                  for finding in findings:
                      rows.add((
                          filename,
                          int(finding.get('line_number', 0)),
                          finding.get('type', ''),
                      ))
              return rows

          baseline_rows = flatten(baseline.get('results'))
          current_rows = flatten(current.get('results'))
          new_rows = sorted(current_rows - baseline_rows)

          report_path = pathlib.Path('secrets-findings.txt')
          if not new_rows:
              report_path.write_text('No new potential secrets detected.\n')
              print('No new potential secrets detected.')
              raise SystemExit(0)

          lines = ['New potential secrets detected:']
          for filename, line_no, finding_type in new_rows:
              lines.append(f'- {filename}:{line_no} ({finding_type})')
          report_path.write_text('\n'.join(lines) + '\n')
          print('\n'.join(lines))
          raise SystemExit(1)
          PY

      - name: Upload secret scan findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-findings
          path: secrets-findings.txt
          if-no-files-found: warn
