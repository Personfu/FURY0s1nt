name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan \
            --exclude-files '\.git/.*' \
            --exclude-files 'core/data/.*' \
            --exclude-files '.*\.sha256' \
            --exclude-files '.*\.pcap' \
            > .secrets-results.json

          python - << 'PYEOF'
          import json, sys

          def load(path):
              try:
                  with open(path) as fh:
                      return json.load(fh)
              except Exception:
                  return {}

          current  = load('.secrets-results.json').get('results', {})
          baseline = load('.secrets.baseline').get('results', {})

          new_findings = []
          for fname, findings in current.items():
              known = {
                  (e['type'], e['line_number'])
                  for e in baseline.get(fname, [])
                  if e.get('is_secret') is False
              }
              for finding in findings:
                  if (finding['type'], finding['line_number']) not in known:
                      new_findings.append(f"  {fname}:{finding['line_number']} -> {finding['type']}")

          if new_findings:
              print(f"::error::detect-secrets found {len(new_findings)} new potential secret(s) not in baseline -- push blocked")
              for line in new_findings:
                  print(line)
              sys.exit(1)
          else:
              print("No new secrets detected (baseline matches)")
          PYEOF

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-results
          path: .secrets-results.json
          retention-days: 30

