name: Release Provenance

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release-provenance-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  attest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build release evidence artifacts
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-bom
          mkdir -p dist
          cyclonedx-py requirements requirements.txt --output-file dist/sbom.cdx.json --output-format JSON
          git archive --format=tar.gz --output=dist/source.tar.gz HEAD
          sha256sum dist/source.tar.gz dist/sbom.cdx.json > dist/SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: dist/*
          if-no-files-found: error

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/source.tar.gz
            dist/sbom.cdx.json
            dist/SHA256SUMS.txt

      - name: Attach evidence to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/source.tar.gz dist/sbom.cdx.json dist/SHA256SUMS.txt --clobber
