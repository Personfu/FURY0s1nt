name: Dependency Audit

on:
  schedule:
    # Weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: dependency-audit
  cancel-in-progress: false

jobs:
  audit-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for known vulnerabilities and generate SBOM
        run: |
          pip install pip-audit
          echo "=== Auditing installed packages ==="
          # Generate JSON report and CycloneDX SBOM in one pass
          pip-audit --format json --output audit-results.json 2>/dev/null || true
          pip-audit --format cyclonedx-json --output sbom.json 2>/dev/null || true
          # Fail on fixable vulnerabilities
          CRITICAL=$(python - << 'PYEOF'
          import json, sys
          try:
              with open('audit-results.json') as fh:
                  data = json.load(fh)
              count = sum(
                  1 for dep in data.get('dependencies', [])
                  for v in dep.get('vulns', [])
                  if v.get('fix_versions')
              )
              print(count)
          except Exception:
              print(0)
          PYEOF
          )
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::pip-audit found $CRITICAL fixable vulnerability/vulnerabilities -- address before merge"
            pip-audit 2>&1 || true
            exit 1
          else
            pip-audit 2>/dev/null || true
          fi

      - name: Check for outdated packages
        run: |
          echo "=== Checking for outdated packages ==="
          pip list --outdated --format json > outdated.json 2>/dev/null || true
          python -c "
          import json
          with open('outdated.json') as f:
              pkgs = json.load(f)
          if not pkgs:
              print('All packages are up to date')
          else:
              print(f'{len(pkgs)} package(s) have updates available:')
              for p in pkgs:
                  print(f'  {p[\"name\"]}: {p[\"version\"]} -> {p[\"latest_version\"]}')
          "

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-${{ github.run_id }}
          path: |
            audit-results.json
            sbom.json
            outdated.json
          retention-days: 90

      - name: Create issue if vulnerabilities found
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VULNS=$(python -c "
          import json, os
          try:
              with open('audit-results.json') as f:
                  data = json.load(f)
              vulns = data.get('dependencies', [])
              count = sum(1 for d in vulns if d.get('vulns'))
              print(count)
          except:
              print(0)
          " 2>/dev/null)

          if [ "$VULNS" -gt 0 ]; then
            gh issue create \
              --title "Dependency vulnerability detected ($(date -u +%Y-%m-%d))" \
              --body "pip-audit found $VULNS vulnerable package(s). Run \`pip-audit\` locally for details. Audit artifacts are attached to workflow run ${{ github.run_id }}." \
              --label "security" 2>/dev/null || echo "Could not create issue (label may not exist)"
          fi
