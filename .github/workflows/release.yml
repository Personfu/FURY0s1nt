name: Release with Attestation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build release for'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-attest:
    name: Build, checksum, and attest release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate CVE report snapshot
        run: |
          mkdir -p dist
          python core/cve_engine.py report \
            --severity CRITICAL \
            --days 30 \
            --format json \
            --output dist/cve-snapshot.json || \
          python scripts/generate_demo_snapshot.py dist/cve-snapshot.json

      - name: Package release archive
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
        run: |
          zip -r "dist/fury0s1nt-${RELEASE_TAG}.zip" \
            core/ scripts/ requirements.txt README.md LICENSE SECURITY.md \
            --exclude "core/data/*.db" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          for f in dist/*; do
            gh release upload "$RELEASE_TAG" "$f" --clobber
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.run_id }}
          path: dist/
          retention-days: 90

